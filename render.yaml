services:
  - type: web
    name: paper-translator-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: TRANSLATION_MODE
        value: deepl
      - key: DEEPL_API_KEY
        sync: false
      - key: LOCAL_DEV
        value: false
      - key: FRONTEND_URL
        sync: false
    plan: free
