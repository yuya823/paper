<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="英語論文PDFを日本語に翻訳し、左右に並べて対訳で読めるWebアプリ" />
  <title>Paper Translator - 英語論文対訳ビューア</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/index.css" />
</head>
<body>
  <div id="app">
    <!-- Fallback content shown before JS loads -->
    <header class="header">
      <div class="header__logo">Paper Translator<span>β</span></div>
    </header>
    <div class="upload-screen">
      <div class="upload-hero">
        <h1>Paper Translator</h1>
        <p>英語の学術論文PDFをアップロードすると、日本語翻訳を生成し<br>左右に並べて対訳で読めます。</p>
      </div>
      <div class="dropzone" id="dropzone">
        <div class="dropzone__icon">📄</div>
        <div class="dropzone__text"><strong>クリックまたはドラッグ&ドロップ</strong><br>でPDFをアップロード (最大50MB)</div>
        <input type="file" id="fileInput" accept=".pdf" style="display:none" />
      </div>
      <div class="doc-list" id="docList"></div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
